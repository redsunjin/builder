name: Safety Regression

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  no-merge-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mock-LLM regression tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Run no-merge safety regression
        env:
          AI_PROVIDER: openai
          AI_MODEL: gpt-4o
          ORCHESTRATOR_DISABLE_MERGE: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/safety_no_merge_regression.py --provider openai --model gpt-4o

      - name: Run reliability smoke (default safe mode)
        env:
          AI_PROVIDER: openai
          AI_MODEL: gpt-4o
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/smoke_orchestrator_reliability.py
